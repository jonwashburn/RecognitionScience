name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH
    
    - name: Check Lean version
      working-directory: lean
      run: lean --version
    
    - name: Download dependencies
      working-directory: lean
      run: lake exe cache get
    
    - name: Build project
      working-directory: lean
      run: lake build
    
    - name: Check for sorries
      working-directory: lean
      run: |
        echo "Checking for 'sorry' in built files..."
        if grep -r "sorry" build/; then
          echo "::warning::Found 'sorry' in built files - proofs are incomplete"
        else
          echo "No 'sorry' found - all proofs complete!"
        fi 